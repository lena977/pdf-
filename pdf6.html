<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 편집기</title>
    
    <!-- 라이브러리 (호환성 높은 버전 고정) -->
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

    <style>
        :root {
            --gradient-bg: linear-gradient(135deg, #f472b6 0%, #db2777 50%, #be185d 100%);
            --primary-pink: #db2777;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background: var(--gradient-bg);
            background-attachment: fixed;
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            background: rgba(255, 255, 255, 0.98);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.2rem;
            color: #000000;
            margin: 0 0 10px 0;
        }

        header p {
            color: #64748b;
            margin: 0;
        }

        /* 업로드 영역 */
        .upload-area {
            border: 2px dashed #e2e8f0;
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            background: #f8fafc;
            position: relative;
        }

        .upload-area.dragover {
            border-color: var(--primary-pink);
            background: #fff1f2;
            transform: scale(1.02);
        }

        .upload-area b {
            color: var(--primary-pink);
            font-size: 1.2rem;
            display: block;
            margin-bottom: 8px;
        }

        /* 페이지 그리드 */
        #pageList {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 30px;
            min-height: 100px;
        }

        .page-item {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 10px;
            position: relative;
            cursor: grab;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .page-item:active { cursor: grabbing; }

        .canvas-wrapper {
            width: 100%;
            aspect-ratio: 1 / 1.414;
            background: #f1f5f9;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        canvas { width: 100%; height: auto; display: block; }

        /* 삭제 버튼 */
        .delete-btn {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #1e293b;
            color: white;
            border: 2px solid white;
            border-radius: 50%;
            width: 26px;
            height: 26px;
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .delete-btn:hover { background: #ef4444; }

        .page-info {
            font-size: 0.7rem;
            margin-top: 8px;
            color: #64748b;
            text-align: center;
            word-break: break-all;
        }

        /* 하단 버튼 */
        .btn-merge {
            background: var(--primary-pink);
            color: white;
            border: none;
            padding: 18px 60px;
            border-radius: 14px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            max-width: 400px;
            display: block;
            margin: 40px auto 0;
        }

        .btn-merge:hover { background: #be185d; transform: translateY(-2px); }
        .btn-merge:disabled { background: #cbd5e1; cursor: not-allowed; transform: none; }

        footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.9);
            text-align: center;
        }

        /* 로딩 레이어 */
        #loader {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.9);
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f4f6;
            border-top: 4px solid var(--primary-pink);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader">
    <div class="spinner"></div>
    <p id="loaderText" style="margin-top:15px; font-weight:600; color:var(--primary-pink);">처리 중...</p>
</div>

<div class="container">
    <header>
        <h1>PDF 편집기</h1>
        <p>파일을 업로드하여 자유롭게 순서를 바꾸거나 삭제하세요.</p>
    </header>

    <!-- 업로드 영역 -->
    <div class="upload-area" id="dropZone">
        <b>여기에 PDF 파일을 드래그하거나 클릭하세요</b>
        <p style="margin:0; font-size:0.9rem; color:#64748b;">(한 번에 여러 개의 파일을 선택할 수 있습니다)</p>
        <input type="file" id="fileInput" multiple accept=".pdf" style="display:none">
    </div>

    <div id="pageList"></div>

    <button id="mergeBtn" class="btn-merge" disabled>PDF 병합 및 다운로드</button>
</div>

<footer>Created by suna kim</footer>

<script>
    // PDF.js 워커 설정
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const pageList = document.getElementById('pageList');
    const mergeBtn = document.getElementById('mergeBtn');
    const loader = document.getElementById('loader');

    let allPages = []; 

    // SortableJS 초기화
    new Sortable(pageList, { animation: 150 });

    // --- 업로드 기능 구현 ---

    // 1. 클릭하여 파일 선택
    dropZone.addEventListener('click', () => fileInput.click());

    // 2. 파일 탐색기에서 다중 선택 시 처리
    fileInput.addEventListener('change', (e) => {
        handleFiles(e.target.files);
        fileInput.value = ""; // 초기화하여 동일 파일 재업로드 가능케 함
    });

    // 3. 드래그 앤 드롭 구현
    // 브라우저 기본 동작(파일 열기) 방지
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, (e) => {
            e.preventDefault();
            e.stopPropagation();
        }, false);
    });

    // 드래그 중 시각적 효과
    ['dragenter', 'dragover'].forEach(eventName => {
        dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
    });
    ['dragleave', 'drop'].forEach(eventName => {
        dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
    });

    // 드롭했을 때 파일 처리
    dropZone.addEventListener('drop', (e) => {
        const dt = e.dataTransfer;
        const files = dt.files;
        handleFiles(files);
    });

    // --- 파일 처리 로직 ---
    async function handleFiles(files) {
        const pdfFiles = Array.from(files).filter(f => f.type === 'application/pdf');
        if (pdfFiles.length === 0) {
            alert("PDF 파일만 업로드할 수 있습니다.");
            return;
        }

        showLoader("파일 분석 및 미리보기를 생성 중입니다...");

        for (const file of pdfFiles) {
            try {
                const arrayBuffer = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({ scale: 0.3 });
                    
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    await page.render({ canvasContext: context, viewport: viewport }).promise;

                    const pageId = 'id_' + Math.random().toString(36).substr(2, 9);
                    
                    allPages.push({
                        id: pageId,
                        fileData: arrayBuffer,
                        pageIndex: i - 1,
                        fileName: file.name
                    });

                    const div = document.createElement('div');
                    div.className = 'page-item';
                    div.setAttribute('data-id', pageId);
                    div.innerHTML = `
                        <button class="delete-btn">✕</button>
                        <div class="canvas-wrapper"></div>
                        <div class="page-info">${file.name}<br><b>${i}페이지</b></div>
                    `;
                    div.querySelector('.canvas-wrapper').appendChild(canvas);
                    
                    div.querySelector('.delete-btn').onclick = () => removePage(pageId);

                    pageList.appendChild(div);
                }
            } catch (err) {
                console.error(err);
                alert(`${file.name} 파일을 읽는 중 오류가 발생했습니다.`);
            }
        }
        updateUI();
        hideLoader();
    }

    function removePage(pageId) {
        allPages = allPages.filter(p => p.id !== pageId);
        const el = document.querySelector(`[data-id="${pageId}"]`);
        if (el) el.remove();
        updateUI();
    }

    function updateUI() {
        mergeBtn.disabled = pageList.children.length === 0;
    }

    function showLoader(text) {
        document.getElementById('loaderText').innerText = text;
        loader.style.display = 'flex';
    }

    function hideLoader() {
        loader.style.display = 'none';
    }

    // --- 병합 및 다운로드 ---
    mergeBtn.addEventListener('click', async () => {
        showLoader("PDF 병합 중입니다...");

        try {
            const { PDFDocument } = PDFLib;
            const mergedPdf = await PDFDocument.create();
            
            // 화면에 정렬된 순서대로 페이지 수집
            const currentOrderIds = Array.from(pageList.children).map(el => el.getAttribute('data-id'));
            
            const pdfDocCache = new Map();

            for (const id of currentOrderIds) {
                const pageInfo = allPages.find(p => p.id === id);
                if (!pageInfo) continue;

                if (!pdfDocCache.has(pageInfo.fileData)) {
                    const doc = await PDFDocument.load(pageInfo.fileData);
                    pdfDocCache.set(pageInfo.fileData, doc);
                }
                
                const sourceDoc = pdfDocCache.get(pageInfo.fileData);
                const [copiedPage] = await mergedPdf.copyPages(sourceDoc, [pageInfo.pageIndex]);
                mergedPdf.addPage(copiedPage);
            }

            const mergedPdfBytes = await mergedPdf.save();
            const blob = new Blob([mergedPdfBytes], { type: 'application/pdf' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `edit_result_${new Date().getTime()}.pdf`;
            a.click();
            URL.revokeObjectURL(url);

        } catch (err) {
            console.error(err);
            alert("병합 중 오류가 발생했습니다.");
        } finally {
            hideLoader();
        }
    });
</script>

</body>
</html>
